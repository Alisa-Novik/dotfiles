set -g status-bg "#f7f1e8"
set -g status-fg "#171512"
set -g status-style "fg=#171512,bg=#f7f1e8"
set -g status-right-style "fg=#4f4942,bg=#f7f1e8"
set -g window-status-style "fg=#4f4942,bg=#f7f1e8"
set -g window-status-current-style "fg=#f7f1e8,bg=#1558a6,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g status-right "#[fg=#765500]%Y-%m-%d #[fg=#1558a6]%H:%M #[default]"
set -g pane-border-style "fg=#c1b8aa"
set -g pane-active-border-style "fg=#1558a6"
set -g message-style "fg=#f7f1e8,bg=#765500,bold"
set -g message-command-style "fg=#f7f1e8,bg=#1558a6,bold"
set -g mode-style "fg=#f7f1e8,bg=#7445a2,bold"
set -g clock-mode-colour "#1558a6"

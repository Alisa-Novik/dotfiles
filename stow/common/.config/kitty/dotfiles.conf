# Portable Kitty settings.  The live kitty.conf remains a small machine-local
# wrapper because Cento owns its current-theme block.

font_family FiraCode Nerd Font
font_size 18.0

window_padding_width 8
background_opacity 0.94
dynamic_background_opacity yes
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
tab_title_template " {index}: {title} "
active_tab_font_style bold
inactive_tab_font_style normal
bell_border_color #ff6b1a

# Keep raw Kitty Backspace aligned with xterm-kitty terminfo and zsh.
map backspace send_text all \x7f

# One switch for Kitty, tmux, and Codex-friendly ANSI colours.
map ctrl+shift+f12 launch --type=background ~/.local/bin/term-theme toggle

include platform.conf
include profile.conf

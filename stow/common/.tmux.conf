set -g default-terminal "tmux-256color"
set -g terminal-overrides ",tmux-256color:Tc"
set -as terminal-features ",xterm-kitty:RGB"
set -g xterm-keys on
set -g mode-keys vi
set -s escape-time 0
set -g focus-events on
set -g allow-passthrough on

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -g mouse on
set -g history-limit 100000

bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9

bind -r f display-popup -E -w 80% -h 70% "$HOME/.local/bin/tmux-sessionizer"
bind r source-file "$HOME/.tmux.conf" \; display-message "Reloaded!"

set -g status on
set -g status-interval 5
set -g status-bg black
set -g status-fg white
set -g status-left-length 50
set -g window-status-style fg=colour244,bg=black
set -g window-status-current-style fg=black,bg=cyan,bold
set -g window-status-separator " | "
set -g status-left "#[fg=green]#S #[default]"
set -g status-right "#[fg=yellow]%Y-%m-%d #[fg=cyan]%H:%M "
set -g window-status-format "#[fg=colour244] #I:#W "
set -g window-status-current-format "#[fg=black,bg=cyan,bold] #I:#W #[default]"
set -g pane-active-border-style fg=cyan
set -g pane-border-style fg=black

if-shell 'test -r "$HOME/.config/dotfiles/tmux/profile.conf"' 'source-file "$HOME/.config/dotfiles/tmux/profile.conf"'

# >>> cento tmux >>>
if-shell 'test "$(cat "$HOME/.config/dotfiles/role" 2>/dev/null)" = personal && test -f "$HOME/.config/cento/tmux.conf"' 'source-file "$HOME/.config/cento/tmux.conf"'
# <<< cento tmux <<<

# tmux does not recursively expand formats stored in user options, so Cento's
# generated status would otherwise display a literal "#S". Keep Cento's badge
# while expanding the session name directly in status-left.
if-shell 'test "$(cat "$HOME/.config/dotfiles/role" 2>/dev/null)" = personal && test -f "$HOME/.config/cento/tmux.conf"' 'set-option -g status-left "#[fg=black,bg=green,bold] #(cento tmux badge) #[default]#[fg=green]#S #[default]"'

if-shell 'test -r "$HOME/.config/dotfiles/tmux/local.conf"' 'source-file "$HOME/.config/dotfiles/tmux/local.conf"'
